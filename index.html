    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sun-bg: #fffdfa;
            --sun-main: #fbbf24;
            --sun-accent: #d97706;
            --sun-soft: #fef3c7;
            --text-dark: #0f172a;
        }

        body {
            background-color: var(--sun-bg);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--sun-soft);
        }

        .navbar-brand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }

        section { padding: 100px 0; border-bottom: 1px solid var(--sun-soft); }
        .section-icon { font-size: 2.5rem; color: var(--sun-main); margin-bottom: 20px; }

        .bento-card {
            background: #fff;
            border: 1px solid var(--sun-soft);
            border-radius: 28px;
            padding: 40px;
            height: 100%;
            transition: transform 0.3s ease;
        }

        .bento-card:hover { transform: translateY(-5px); border-color: var(--sun-main); }

        .category-label {
            display: inline-block;
            background: var(--sun-soft);
            color: var(--sun-accent);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .timeline-box { border-left: 3px solid var(--sun-main); padding-left: 25px; position: relative; margin-bottom: 40px; }
        .timeline-box::before {
            content: ''; position: absolute; left: -11px; top: 0;
            width: 18px; height: 18px; background: var(--sun-main); border-radius: 50%;
        }

        .app-tag {
            background: var(--sun-soft);
            color: var(--sun-accent);
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            margin: 5px;
            font-size: 0.85rem;
        }

        .profile-img {
            width: 300px;
            height: 300px;
            border-radius: 50px;
            object-fit: cover;
            object-position: top;
            border: 10px solid #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .btn-sun { background: var(--sun-main); color: #000; font-weight: 700; border-radius: 15px; padding: 12px 30px; border: none; }
        .btn-sun:hover { background: var(--text-dark); color: #fff; }

        footer { padding: 40px 0; text-align: center; background: #fff; }
    </style>
</head>
